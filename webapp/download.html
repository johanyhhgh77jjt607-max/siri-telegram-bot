<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#1a1a2e;--card:#16213e;--text:#eee;--text2:#aaa;--gold:#e94560;--accent:#0f3460}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
h1{text-align:center;font-size:20px;margin-bottom:4px}
.emoji{font-size:48px;text-align:center;margin:16px 0}
.sub{text-align:center;color:var(--text2);font-size:13px;margin-bottom:16px}
.card{background:var(--card);border-radius:16px;padding:20px}
.label{font-size:14px;color:var(--text2);margin-bottom:8px;display:block}
input{width:100%;background:var(--bg);border:1px solid var(--accent);border-radius:12px;padding:14px;color:var(--text);font-size:14px;direction:ltr;text-align:left}
.platforms{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-top:12px}
.p{text-align:center;font-size:12px;color:var(--text2);padding:6px}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.btn{background:var(--gold);color:#fff;border:none;border-radius:14px;padding:16px;font-size:17px;font-weight:700;cursor:pointer;transition:.2s}
.btn:hover{opacity:.9;transform:translateY(-2px)}
.btn.sec{background:var(--accent)}
#status{text-align:center;margin-top:12px;font-size:14px;color:var(--text2)}
</style>
</head>
<body>
<h1>📥 تحميل فيديو</h1>
<div class="sub">الصق رابط الفيديو من أي منصة</div>
<div class="emoji">⬇️</div>

<div class="card">
<label class="label">🔗 رابط الفيديو</label>
<input id="url" placeholder="https://..." type="url">
<div class="platforms">
<div class="p">🎵 تيك توك</div><div class="p">▶️ يوتيوب</div>
<div class="p">📷 انستغرام</div><div class="p">🐦 X</div>
<div class="p">👻 سناب</div><div class="p">📌 بنترست</div>
<div class="p">📘 فيسبوك</div><div class="p">👽 ريديت</div>
</div>
<div class="btn-row">
<button class="btn" onclick="send('video')">📥 تحميل فيديو</button>
<button class="btn sec" onclick="send('mp3')">🎵 تحويل MP3</button>
</div>
<div id="status"></div>
</div>

<script>
(function() {
  try {
    var tw = window.Telegram.WebApp;
    tw.ready();
    tw.expand();
    tw.MainButton.hide();
    tw.BackButton.hide();
    window._tw = tw;
  } catch(e) {
    console.error("Telegram WebApp init error:", e);
  }
})();

function send(mode) {
  var url = document.getElementById('url').value.trim();
  if (!url) {
    document.getElementById('status').textContent = '⚠️ الصق الرابط';
    return;
  }
  document.getElementById('status').textContent = '⏳ جاري التحميل...';
  try {
    window._tw.sendData(JSON.stringify({type:'download',url:url,mode:mode}));
    window._tw.close();
  } catch(e) {
    document.getElementById('status').textContent = '❌ خطأ: ' + e.message;
  }
}
</script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v4513226cdae34746b4dedf0b4dfa099e1781791509496" integrity="sha512-ZE9pZaUXND66v380QUtch/5sE9tPFh2zg45pR2PB0CVkCtOREv2AJKkSidISWkysEuQ0EH8faUU5du78bx87UQ==" data-cf-beacon='{"version":"2024.11.0","token":"3279d41ec7804124a29acc6e692f9a2b","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#1a1a2e;--card:#16213e;--text:#eee;--text2:#aaa;--gold:#e94560;--accent:#0f3460;--green:#00c853}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
h1{text-align:center;font-size:20px;margin-bottom:4px;color:var(--gold)}
.sub{text-align:center;color:var(--text2);font-size:13px;margin-bottom:16px}
.card{background:var(--card);border-radius:16px;padding:18px}
.label{font-size:14px;color:var(--text2);margin-bottom:8px;display:block}
input{width:100%;background:var(--bg);border:1px solid var(--accent);border-radius:12px;padding:14px;color:var(--text);font-size:14px;direction:ltr;text-align:left}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.btn{color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;transition:.2s}
.btn:active{transform:scale(.96)}
.btn.dl{background:var(--gold)}
.btn.mp3{background:var(--accent)}
#status{text-align:center;margin-top:12px;font-size:14px;min-height:20px}
</style>
</head>
<body>
<h1>📥 تحميل فيديو</h1>
<div class="sub">الصق رابط الفيديو</div>

<div class="card">
<label class="label">🔗 الرابط</label>
<input id="url" placeholder="https://..." type="url">
<div class="btn-row">
<button class="btn dl" onclick="send('video')">📥 تحميل فيديو</button>
<button class="btn mp3" onclick="send('mp3')">🎵 تحويل MP3</button>
</div>
<div id="status"></div>
</div>

<script>
var INIT_OK = false;
try {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  Telegram.WebApp.MainButton.hide();
  Telegram.WebApp.BackButton.hide();
  INIT_OK = true;
  document.getElementById('status').textContent = '✅ جاهز | v' + Telegram.WebApp.version;
} catch(e) {
  document.getElementById('status').textContent = '❌ فشل التهيئة: ' + e.message;
}

function send(mode) {
  if (!INIT_OK) { showStatus('❌ WebApp غير جاهز'); return; }
  var url = document.getElementById('url').value.trim();
  if (!url) { showStatus('⚠️ الصق الرابط'); return; }
  showStatus('⏳ جاري التحميل...');
  try {
    Telegram.WebApp.sendData(JSON.stringify({type:'download', url:url, mode:mode}));
  } catch(e) {
    showStatus('❌ خطأ: ' + e.message);
  }
}

function showStatus(msg) {
  var s = document.getElementById('status');
  s.textContent = msg;
  if (msg.startsWith('❌')) s.style.color = '#e94560';
  else s.style.color = '#aaa';
}
</script>

</body>
</html>

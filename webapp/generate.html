<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#1a1a2e;--card:#16213e;--accent:#0f3460;--gold:#e94560;--text:#eee;--text2:#aaa;--green:#00c853}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
h1{text-align:center;font-size:20px;margin-bottom:4px}
.emoji{font-size:40px;text-align:center;margin:10px 0}
.sub{text-align:center;color:var(--text2);font-size:13px;margin-bottom:16px}
.card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:12px}
.label{font-size:14px;color:var(--text2);margin-bottom:8px;display:block}
textarea{width:100%;background:var(--bg);border:1px solid var(--accent);border-radius:12px;padding:14px;color:var(--text);font-size:15px;font-family:monospace;resize:vertical;min-height:130px}
.type-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.type-btn{background:var(--accent);color:var(--text);border:2px solid transparent;border-radius:12px;padding:12px;font-size:14px;cursor:pointer;transition:.2s;text-align:center}
.type-btn:hover{opacity:.9}
.type-btn.active{border-color:var(--gold);background:var(--btn);box-shadow:0 0 12px rgba(233,69,96,.3)}
.btn{width:100%;background:var(--gold);color:#fff;border:none;border-radius:14px;padding:16px;font-size:17px;font-weight:700;cursor:pointer;margin-top:14px;transition:.2s}
.btn:hover{opacity:.9;transform:translateY(-2px)}
#status{text-align:center;margin-top:12px;font-size:14px;color:var(--text2)}
</style>
</head>
<body>
<h1>🏗️ توليد كود</h1>
<div class="sub">اكتب وصف المشروع وسيتم توليد الكود تلقائياً</div>

<div class="emoji">💻</div>

<div class="card">
<label class="label">📝 وصف المشروع</label>
<textarea id="desc" placeholder="مثال: بوت تيليجرام للحجز... أو: بلوكن طرد للجميع..."></textarea>
<div class="type-row">
<div class="type-btn active" onclick="selectType('project',this)">📦 مشروع</div>
<div class="type-btn" onclick="selectType('plugin',this)">🧩 بلوكن</div>
<div class="type-btn" onclick="selectType('tool',this)">🛠️ أداة</div>
</div>
<button class="btn" onclick="send()">🚀 توليد الكود</button>
<div id="status"></div>
</div>

<script>
const tw = window.Telegram.WebApp; tw.ready(); tw.expand();
let selectedType = 'project';

function selectType(type, el) {
  selectedType = type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function send() {
  const desc = document.getElementById('desc').value.trim();
  if (!desc) { document.getElementById('status').textContent='⚠️ اكتب وصف المشروع'; return; }
  document.getElementById('status').textContent='⏳ جاري التوليد...';
  tw.sendData(JSON.stringify({type:'generate',desc:desc,kind:selectedType}));
  tw.close();
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#1a1a2e;--card:#16213e;--accent:#0f3460;--gold:#e94560;--text:#eee;--text2:#aaa;--green:#00c853}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
h1{text-align:center;font-size:20px;margin-bottom:4px;color:var(--gold)}
.sub{text-align:center;color:var(--text2);font-size:13px;margin-bottom:14px}
.card{background:var(--card);border-radius:16px;padding:18px;margin-bottom:14px}
.label{font-size:14px;color:var(--text2);margin-bottom:8px;display:block}
textarea{width:100%;background:var(--bg);border:1px solid var(--accent);border-radius:12px;padding:14px;color:var(--text);font-size:15px;font-family:monospace;resize:vertical;min-height:100px;direction:rtl}
.type-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px}
.type-btn{background:var(--accent);color:var(--text);border:2px solid transparent;border-radius:10px;padding:10px;font-size:13px;cursor:pointer;text-align:center}
.type-btn.active{border-color:var(--gold);background:var(--card);box-shadow:0 0 10px rgba(233,69,96,.3)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.btn{color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;transition:.2s}
.btn:active{transform:scale(.96)}
.btn.gpt{background:#10a37f}
.btn.gemini{background:#4285f4}
.btn.both{background:linear-gradient(135deg,#10a37f,#4285f4)}
.model-tag{font-size:10px;display:block;opacity:.7;margin-top:2px}
#status{text-align:center;margin-top:10px;font-size:14px;min-height:20px}
</style>
</head>
<body>
<h1>🏗️ توليد كود</h1>
<div class="sub">اكتب وصف المشروع — يشتغل GPT-4o + Gemini معاً</div>

<div class="card">
<label class="label">📝 وصف المشروع</label>
<textarea id="desc" placeholder="بوت تيليجرام للحجز..."></textarea>
<div class="type-row">
<div class="type-btn active" onclick="selectType('project',this)">📦 مشروع</div>
<div class="type-btn" onclick="selectType('plugin',this)">🧩 بلوكن</div>
<div class="type-btn" onclick="selectType('tool',this)">🛠️ أداة</div>
</div>
<div class="btn-row">
<button class="btn gpt" onclick="generate('openrouter')">🚀 GPT-4o<span class="model-tag">OpenRouter</span></button>
<button class="btn gemini" onclick="generate('gemini')">🚀 Gemini<span class="model-tag">Google AI</span></button>
</div>
<button class="btn both" onclick="generate('both')" style="width:100%;margin-top:8px">⚡ الاثنين معاً<span class="model-tag">GPT-4o + Gemini</span></button>
</div>

<div id="status"></div>

<script>
var INIT_OK = false, selectedType = 'project';
try {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  Telegram.WebApp.MainButton.hide();
  Telegram.WebApp.BackButton.hide();
  INIT_OK = true;
  document.getElementById('status').textContent = '✅ جاهز | v' + Telegram.WebApp.version;
} catch(e) {
  document.getElementById('status').textContent = '❌ فشل التهيئة: ' + e.message;
}

function selectType(type, el) {
  selectedType = type;
  document.querySelectorAll('.type-btn').forEach(function(b){b.classList.remove('active')});
  el.classList.add('active');
}

function generate(model) {
  if (!INIT_OK) { showStatus('❌ WebApp غير جاهز'); return; }
  var desc = document.getElementById('desc').value.trim();
  if (!desc) { showStatus('⚠️ اكتب وصف المشروع'); return; }
  showStatus('⏳ جاري التوليد بـ ' + model + '...');
  try {
    Telegram.WebApp.sendData(JSON.stringify({type:'generate', desc:desc, kind:selectedType, model:model}));
  } catch(e) {
    showStatus('❌ خطأ: ' + e.message);
  }
}

function showStatus(msg) {
  var s = document.getElementById('status');
  s.textContent = msg;
  if (msg.startsWith('❌')) s.style.color = '#e94560';
  else s.style.color = '#aaa';
}
</script>

</body>
</html>

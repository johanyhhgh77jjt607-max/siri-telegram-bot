<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#1a1a2e;--card:#16213e;--accent:#0f3460;--gold:#e94560;--text:#eee;--text2:#aaa;--green:#00c853}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
h1{text-align:center;font-size:20px;margin-bottom:4px;color:var(--gold)}
.sub{text-align:center;color:var(--text2);font-size:13px;margin-bottom:14px}
.card{background:var(--card);border-radius:16px;padding:18px;margin-bottom:14px}
.label{font-size:14px;color:var(--text2);margin-bottom:8px;display:block}
textarea{width:100%;background:var(--bg);border:1px solid var(--accent);border-radius:12px;padding:14px;color:var(--text);font-size:15px;font-family:monospace;resize:vertical;min-height:130px;direction:ltr;text-align:left}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.btn{background:var(--accent);color:var(--text);border:2px solid transparent;border-radius:12px;padding:14px;font-size:14px;cursor:pointer;transition:.2s;font-weight:600;text-align:center}
.btn:active{transform:scale(.96)}
.btn.claude{background:#d97706;border-color:#f59e0b}
.btn.gpt{background:#10a37f;border-color:#1bd49e}
.btn.groq{background:#f97316;border-color:#fb923c}
.btn.gemini{background:#4285f4;border-color:#6aa3ff}
.btn.img{background:var(--gold)}
.model-tag{font-size:10px;display:block;opacity:.7;margin-top:2px}
#status{text-align:center;margin-top:10px;font-size:14px;min-height:20px}
</style>
</head>
<body>
<h1>🤖 Siri - تحليل الكود</h1>
<div class="sub">الصق الكود واختر النموذج</div>

<div class="card">
<label class="label">📝 الصق كود Python</label>
<textarea id="code" placeholder="print('Hello World')&#10;def add(a,b): return a+b"></textarea>
<div class="btn-row">
<button class="btn claude" onclick="send('analyze','openrouter')">🔍 شرح<span class="model-tag">GPT-4o + Claude</span></button>
<button class="btn groq" onclick="send('explain','groq')">📖 تفصيل<span class="model-tag">Groq Llama</span></button>
</div>
<div class="btn-row">
<button class="btn gpt" onclick="send('fix','openrouter')">🔧 إصلاح<span class="model-tag">GPT-4o</span></button>
<button class="btn groq" onclick="send('optimize','groq')">⚡ تحسين<span class="model-tag">Groq</span></button>
</div>
</div>

<div class="card">
<label class="label">🎨 توليد صورة</label>
<textarea id="img-prompt" placeholder="وصف الصورة..." style="min-height:50px"></textarea>
<button class="btn img" onclick="sendImage()" style="width:100%;margin-top:8px">🎨 رسم</button>
</div>

<div id="status"></div>

<script>
var INIT_OK = false;
try {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  Telegram.WebApp.MainButton.hide();
  Telegram.WebApp.BackButton.hide();
  INIT_OK = true;
  document.getElementById('status').textContent = '✅ جاهز | v' + Telegram.WebApp.version;
} catch(e) {
  document.getElementById('status').textContent = '❌ فشل التهيئة: ' + e.message;
}

function send(action, model) {
  if (!INIT_OK) { showStatus('❌ WebApp غير جاهز'); return; }
  var code = document.getElementById('code').value.trim();
  if (!code) { showStatus('⚠️ الصق الكود أولاً'); return; }
  showStatus('⏳ ' + action + ' via ' + model + '...');
  try {
    Telegram.WebApp.sendData(JSON.stringify({type:'code', action:action, code:code, model:model}));
  } catch(e) {
    showStatus('❌ خطأ: ' + e.message);
  }
}

function sendImage() {
  if (!INIT_OK) { showStatus('❌ WebApp غير جاهز'); return; }
  var prompt = document.getElementById('img-prompt').value.trim();
  if (!prompt) { showStatus('⚠️ اكتب وصف الصورة'); return; }
  showStatus('⏳ جاري الرسم...');
  try {
    Telegram.WebApp.sendData(JSON.stringify({type:'image', prompt:prompt}));
  } catch(e) {
    showStatus('❌ خطأ: ' + e.message);
  }
}

function showStatus(msg) {
  var s = document.getElementById('status');
  s.textContent = msg;
  if (msg.startsWith('❌')) s.style.color = '#e94560';
  else s.style.color = '#aaa';
}
</script>

</body>
</html>
